<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동물상 테스트 - 강아지인가 고양이인가?</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <button class="theme-toggle" id="theme-toggle">Dark Mode</button>
    
    <div class="test-container">
        <h1>동물상 테스트</h1>
        <p class="subtitle">나의 얼굴은 강아지상일까, 고양이상일까?</p>
        
        <div class="upload-section">
            <div id="image-container" class="preview-container">
                <img id="face-image" src="#" alt="your image" style="display:none; max-width: 100%; border-radius: 10px;" />
                <div id="webcam-container"></div>
            </div>
            
            <div class="button-group">
                <input type="file" id="file-input" accept="image/*" style="display:none;">
                <button type="button" class="action-btn" onclick="document.getElementById('file-input').click()">사진 업로드</button>
                <button type="button" class="action-btn" id="webcam-btn">웹캠 시작</button>
            </div>
        </div>

        <div id="loading" style="display:none;">분석 중...</div>
        
        <div class="result-section">
            <h2 id="result-message"></h2>
            <div id="label-container" class="result-container"></div>
        </div>
    </div>

    <div class="contact-container">
        <h2>제휴 문의</h2>
        <form action="https://formspree.io/f/mojrdnrk" method="POST">
            <div class="form-group">
                <label for="name">성함/업체명</label>
                <input type="text" id="name" name="name" required placeholder="성함 또는 업체명을 입력해주세요">
            </div>
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" name="email" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" required placeholder="문의하실 내용을 입력해주세요"></textarea>
            </div>
            <button type="submit" class="submit-btn">문의하기</button>
        </form>
    </div>

    <div class="comments-container">
        <div id="disqus_thread"></div>
    </div>
    
    <script>
        (function() {
        var d = document, s = d.createElement('script');
        s.src = 'https://sistars-gumi-test-2.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
        })();
    </script>
    <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>

    <script src="main.js"></script>
</body>
</html>
